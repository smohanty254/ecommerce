name: Deploy AWS Free Tier

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        default: us-east-1
        required: true
      stack_name:
        description: CloudFormation stack name
        default: ecommerce-platform
        required: true
      key_name:
        description: Existing EC2 key pair name
        required: true
      ssh_cidr:
        description: CIDR allowed to SSH, for example 203.0.113.10/32
        default: 0.0.0.0/0
        required: true
      instance_type:
        description: t3.micro is free-tier-friendly; t3.small is safer for the full stack.
        default: t3.micro
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Provision EC2 Docker host
        run: |
          aws cloudformation deploy \
            --stack-name "${{ inputs.stack_name }}" \
            --template-file infra/aws/free-tier-ec2-cloudformation.yml \
            --parameter-overrides \
              ProjectName="${{ inputs.stack_name }}" \
              InstanceType="${{ inputs.instance_type }}" \
              KeyName="${{ inputs.key_name }}" \
              SSHCidr="${{ inputs.ssh_cidr }}"

      - name: Read stack outputs
        id: stack
        run: |
          PUBLIC_IP="$(aws cloudformation describe-stacks --stack-name "${{ inputs.stack_name }}" --query "Stacks[0].Outputs[?OutputKey=='PublicIp'].OutputValue" --output text)"
          FRONTEND_URL="$(aws cloudformation describe-stacks --stack-name "${{ inputs.stack_name }}" --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" --output text)"
          API_URL="$(aws cloudformation describe-stacks --stack-name "${{ inputs.stack_name }}" --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)"
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/aws_ec2_key
          chmod 600 ~/.ssh/aws_ec2_key
          for i in {1..30}; do
            if ssh-keyscan -H "${{ steps.stack.outputs.public_ip }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            sleep 10
          done

      - name: Upload release
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='dist' --exclude='coverage' -czf release.tar.gz .
          ssh -i ~/.ssh/aws_ec2_key ec2-user@${{ steps.stack.outputs.public_ip }} "mkdir -p /opt/${{ inputs.stack_name }}"
          scp -i ~/.ssh/aws_ec2_key release.tar.gz ec2-user@${{ steps.stack.outputs.public_ip }}:/opt/${{ inputs.stack_name }}/release.tar.gz

      - name: Run Docker Compose on EC2
        run: |
          ssh -i ~/.ssh/aws_ec2_key ec2-user@${{ steps.stack.outputs.public_ip }} << EOF
          set -euo pipefail
          cd /opt/${{ inputs.stack_name }}
          tar -xzf release.tar.gz
          cat > .env.production << ENV
          POSTGRES_DB=ecommerce
          POSTGRES_USER=ecommerce
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=postgres://ecommerce:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/ecommerce
          REDIS_URL=redis://redis:6379
          KAFKA_BROKERS=kafka:29092
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_TTL=15m
          JWT_REFRESH_TTL_DAYS=30
          APP_ORIGIN=${{ steps.stack.outputs.frontend_url }}
          NEXT_PUBLIC_API_URL=${{ steps.stack.outputs.api_url }}
          NEXT_PUBLIC_SOCKET_URL=${{ steps.stack.outputs.api_url }}
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          ENV
          docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          EOF

      - name: Deployment URL
        run: |
          echo "### AWS deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Application: ${{ steps.stack.outputs.frontend_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "API: ${{ steps.stack.outputs.api_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Grafana: http://${{ steps.stack.outputs.public_ip }}:3001" >> "$GITHUB_STEP_SUMMARY"
          echo "Jaeger: http://${{ steps.stack.outputs.public_ip }}:16686" >> "$GITHUB_STEP_SUMMARY"
